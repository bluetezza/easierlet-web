<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#1A6B55">
  <title>Tenant login — easierLet</title>
  <meta name="description" content="Sign in to track your applications, viewings and tenancy on easierLet.">
  <meta name="robots" content="noindex">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="/assets/easierlet.css">

  <style>
    body {
      font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      min-height: 100vh;
      display: flex; flex-direction: column;
      background:
        radial-gradient(ellipse at 80% 0%, rgba(29, 158, 117, 0.06), transparent 60%),
        radial-gradient(ellipse at 0% 100%, rgba(26, 107, 85, 0.04), transparent 50%),
        var(--el-bg);
    }
    .top { padding: 22px 24px; display: flex; align-items: center; justify-content: space-between; }
    .brand { font-size: 20px; letter-spacing: -0.3px; color: var(--el-ink); }
    .brand .e { font-family: 'Fraunces', serif; font-weight: 400; }
    .brand .l { font-weight: 500; }
    .top-link { font-size: 14px; color: var(--el-muted); }
    .top-link:hover { color: var(--el-green); }

    main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px 20px; }
    .card {
      width: 100%; max-width: 420px;
      background: #fff;
      border: 1px solid var(--el-line);
      border-radius: 18px;
      padding: 36px;
      box-shadow: 0 8px 40px rgba(15, 46, 40, 0.06);
    }
    .eyebrow {
      font-size: 11px; font-weight: 500; letter-spacing: 1px;
      text-transform: uppercase; color: var(--el-green);
      margin-bottom: 12px;
    }
    .card h1 {
      font-family: 'Fraunces', serif; font-weight: 400;
      font-size: 28px; letter-spacing: -0.5px; color: var(--el-ink);
      margin-bottom: 8px;
    }
    .card .lead { color: var(--el-muted); font-size: 14px; margin-bottom: 24px; }

    .seg {
      display: grid; grid-template-columns: 1fr 1fr;
      background: var(--el-bg);
      border: 1px solid var(--el-line);
      border-radius: 10px; padding: 4px;
      margin-bottom: 22px;
    }
    .seg button {
      padding: 8px 12px; border-radius: 7px;
      font-size: 13px; font-weight: 500;
      color: var(--el-muted);
    }
    .seg button.active { background: #fff; color: var(--el-ink); box-shadow: 0 1px 3px rgba(15,46,40,0.06); }

    .field { margin-bottom: 14px; }
    .field label {
      display: block; font-size: 11px; font-weight: 500; letter-spacing: 0.5px;
      text-transform: uppercase; color: var(--el-muted); margin-bottom: 6px;
    }
    .field input {
      width: 100%; padding: 12px 14px;
      background: #fff; border: 1px solid var(--el-line);
      border-radius: 10px; font-size: 15px; color: var(--el-ink);
      font-family: inherit; outline: none;
      transition: border-color 120ms ease, box-shadow 120ms ease;
    }
    .field input:focus { border-color: var(--el-green); box-shadow: 0 0 0 3px rgba(26,107,85,0.12); }

    .submit {
      width: 100%; margin-top: 6px;
      padding: 14px;
      background: var(--el-green); color: #fff;
      border-radius: 10px; font-size: 15px; font-weight: 500;
    }
    .submit:hover:not(:disabled) { background: #155545; }
    .submit:disabled { opacity: 0.7; cursor: not-allowed; }

    .divider {
      display: flex; align-items: center; gap: 10px;
      margin: 22px 0 16px;
      color: var(--el-muted); font-size: 12px;
      text-transform: uppercase; letter-spacing: 0.6px;
    }
    .divider::before, .divider::after {
      content: ""; flex: 1; height: 1px; background: var(--el-line);
    }

    .magic-btn {
      width: 100%;
      padding: 12px;
      background: transparent;
      color: var(--el-green);
      border: 1px solid var(--el-green-border);
      border-radius: 10px;
      font-size: 14px; font-weight: 500;
    }
    .magic-btn:hover { background: var(--el-green-pale); }

    .alt-link { text-align: center; font-size: 13px; color: var(--el-muted); margin-top: 20px; }
    .alt-link a { color: var(--el-green); font-weight: 500; }

    .alert {
      padding: 12px 14px; border-radius: 10px;
      font-size: 13px; line-height: 1.5;
      margin-bottom: 16px; display: none;
    }
    .alert-error   { background: #FFE8DC; color: var(--el-danger); border: 1px solid #F5C5B0; }
    .alert-success { background: var(--el-green-pale); color: var(--el-green); border: 1px solid var(--el-green-border); }
    .alert.show { display: block; }
  </style>
</head>
<body>

<div class="top">
  <a href="/" class="brand"><span class="e">easier</span><span class="l">Let</span></a>
  <a href="/landlord/login/" class="top-link">Landlord login &rarr;</a>
</div>

<main>
  <div class="card">
    <div class="eyebrow">Tenant portal</div>
    <h1 id="title">Welcome back</h1>
    <p class="lead" id="lead">Sign in to track your applications, viewings and tenancy.</p>

    <div class="seg" role="tablist">
      <button id="modeSignin" class="active" type="button">Sign in</button>
      <button id="modeSignup" type="button">Create account</button>
    </div>

    <div class="alert alert-error" id="errorAlert"></div>
    <div class="alert alert-success" id="successAlert"></div>

    <form id="authForm">
      <div class="field" id="nameField" style="display:none">
        <label for="name">Your name</label>
        <input id="name" name="name" type="text" autocomplete="name">
      </div>
      <div class="field">
        <label for="email">Email</label>
        <input id="email" name="email" type="email" autocomplete="email" required>
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input id="password" name="password" type="password" autocomplete="current-password" minlength="8" required>
      </div>
      <button type="submit" class="submit" id="submitBtn">Sign in</button>
    </form>

    <div class="divider">or</div>
    <button class="magic-btn" id="magicBtn" type="button">Email me a magic link</button>

    <div class="alt-link">
      Looking for a home? <a href="/properties/">Browse properties to let &rarr;</a>
    </div>
  </div>
</main>

<script type="module">
  import { createClient } from "https://esm.sh/@supabase/supabase-js@2.45.4";

  const SUPABASE_URL = "https://ffzknvcptqjlkxmkdxuk.supabase.co";
  const SUPABASE_ANON = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZmemtudmNwdHFqbGt4bWtkeHVrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUyNTQ0ODQsImV4cCI6MjA5MDgzMDQ4NH0.YRdkBgoVm7cpUJlsK8T4nP6iNE3vgfOmODImiAkPhr4";

  const ROLE = "tenant";
  const HOME = "/tenant/";
  const LOGIN = "/tenant/login/";

  const client = createClient(SUPABASE_URL, SUPABASE_ANON, {
    auth: {
      persistSession: true,
      autoRefreshToken: true,
      detectSessionInUrl: true,
      storageKey: "el-portal-session",
    },
  });

  const url = new URL(window.location.href);
  const next = url.searchParams.get("next") || HOME;
  let mode = url.searchParams.get("signup") === "1" ? "signup" : "signin";

  const { data: { session } } = await client.auth.getSession();
  if (session) {
    window.location.replace(next);
  }

  const $ = (id) => document.getElementById(id);
  const errorAlert = $("errorAlert");
  const successAlert = $("successAlert");
  const submitBtn = $("submitBtn");
  const passwordInput = $("password");

  function setMode(m) {
    mode = m;
    $("modeSignin").classList.toggle("active", m === "signin");
    $("modeSignup").classList.toggle("active", m === "signup");
    $("nameField").style.display = m === "signup" ? "" : "none";
    $("title").textContent = m === "signup" ? "Create your account" : "Welcome back";
    $("lead").textContent = m === "signup"
      ? "Apply for homes, book viewings and manage your tenancy in one place."
      : "Sign in to track your applications, viewings and tenancy.";
    submitBtn.textContent = m === "signup" ? "Create account" : "Sign in";
    passwordInput.setAttribute("autocomplete", m === "signup" ? "new-password" : "current-password");
    clearAlerts();
  }
  $("modeSignin").addEventListener("click", () => setMode("signin"));
  $("modeSignup").addEventListener("click", () => setMode("signup"));
  setMode(mode);

  function clearAlerts() {
    errorAlert.classList.remove("show");
    successAlert.classList.remove("show");
  }
  function showError(msg) { errorAlert.textContent = msg; errorAlert.classList.add("show"); successAlert.classList.remove("show"); }
  function showSuccess(msg) { successAlert.textContent = msg; successAlert.classList.add("show"); errorAlert.classList.remove("show"); }

  async function ensureProfileRole(user, name) {
    if (!user) return;
    try {
      await client.from("profiles").upsert({
        id: user.id,
        role: ROLE,
        ...(name ? { full_name: name } : {}),
      }, { onConflict: "id" });
    } catch (e) {
      // The tenant flow can also create rows in `tenants` and link
      // tenant_auth_id via the tenant-portal edge function — see Swift
      // tenant-portal/index.ts. RLS may forbid this upsert; it's non-fatal.
      console.warn("profile upsert failed", e);
    }
  }

  $("authForm").addEventListener("submit", async (e) => {
    e.preventDefault();
    clearAlerts();
    submitBtn.disabled = true;

    const email = $("email").value.trim();
    const password = $("password").value;
    const name = $("name").value.trim();

    try {
      if (mode === "signup") {
        const { data, error } = await client.auth.signUp({
          email, password,
          options: {
            data: { role: ROLE, full_name: name || undefined },
            emailRedirectTo: `${window.location.origin}${LOGIN}`,
          },
        });
        if (error) throw error;
        if (!data.session) {
          showSuccess("Account created. Check your email to confirm, then sign in.");
          submitBtn.disabled = false;
          return;
        }
        await ensureProfileRole(data.user, name);
        window.location.replace(next);
      } else {
        const { data, error } = await client.auth.signInWithPassword({ email, password });
        if (error) throw error;
        await ensureProfileRole(data.user);
        window.location.replace(next);
      }
    } catch (err) {
      showError(err?.message || "Something went wrong. Please try again.");
      submitBtn.disabled = false;
    }
  });

  $("magicBtn").addEventListener("click", async () => {
    clearAlerts();
    const email = $("email").value.trim();
    if (!email) {
      showError("Enter your email first, then we'll send you a magic link.");
      $("email").focus();
      return;
    }
    try {
      const { error } = await client.auth.signInWithOtp({
        email,
        options: {
          shouldCreateUser: mode === "signup",
          emailRedirectTo: `${window.location.origin}${LOGIN}?next=${encodeURIComponent(next)}`,
          data: mode === "signup" ? { role: ROLE } : undefined,
        },
      });
      if (error) throw error;
      showSuccess(`We've sent a sign-in link to ${email}. Check your inbox.`);
    } catch (err) {
      showError(err?.message || "Could not send the magic link.");
    }
  });
</script>
</body>
</html>
