<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>easierLet — Inventory Review</title>
  <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.1.7/dist/signature_pad.umd.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #F5F7F5; color: #1A2E28; }
    .header { background: white; padding: 20px; border-bottom: 1px solid #E0E8E4; text-align: center; position: sticky; top: 0; z-index: 10; }
    .logo { color: #1A6B55; font-size: 24px; font-weight: 300; }
    .logo span { font-weight: 700; }
    .subtitle { color: #6B8278; font-size: 13px; margin-top: 4px; }
    .container { max-width: 640px; margin: 0 auto; padding: 20px; }
    .intro-card { background: white; border-radius: 12px; padding: 20px; margin-bottom: 20px; border: 1px solid #E0E8E4; }
    .intro-card h1 { font-size: 18px; color: #1A2E28; margin-bottom: 8px; }
    .intro-card p { color: #6B8278; font-size: 14px; line-height: 1.5; margin-top: 8px; }
    .address { color: #1A6B55; font-weight: 600; }
    .type-badge { display: inline-block; font-size: 12px; font-weight: 600; padding: 4px 10px; border-radius: 20px; margin-top: 8px; }
    .type-badge.move-in { background: #E8F4F0; color: #1A6B55; }
    .type-badge.move-out { background: #F0E8F4; color: #6B3FA0; }
    .room { background: white; border-radius: 12px; padding: 20px; margin-bottom: 16px; border: 1px solid #E0E8E4; }
    .room-title { font-size: 16px; font-weight: 700; color: #1A6B55; margin-bottom: 12px; padding-bottom: 10px; border-bottom: 1px solid #E0E8E4; }
    .item { padding: 14px 0; border-bottom: 1px solid #F0F4F2; }
    .item:last-child { border-bottom: none; }
    .item-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; flex-wrap: wrap; gap: 8px; }
    .item-name { font-weight: 600; font-size: 14px; }
    .landlord-badge { font-size: 12px; padding: 3px 8px; border-radius: 20px; background: #E8F4F0; color: #1A6B55; }
    .landlord-notes { font-size: 12px; color: #6B8278; margin-bottom: 10px; font-style: italic; }
    .field-group { margin-top: 10px; }
    .field-group label { display: block; font-size: 11px; font-weight: 600; color: #6B8278; letter-spacing: 0.5px; text-transform: uppercase; margin-bottom: 6px; margin-top: 10px; }
    select, textarea, input[type="text"] { width: 100%; padding: 10px 12px; border: 1px solid #E0E8E4; border-radius: 8px; font-size: 14px; font-family: inherit; background: #F5F7F5; color: #1A2E28; -webkit-appearance: none; }
    select:focus, textarea:focus, input[type="text"]:focus { outline: none; border-color: #1A6B55; }
    textarea { min-height: 72px; resize: vertical; }
    .meter-section { background: white; border-radius: 12px; padding: 20px; margin-bottom: 16px; border: 1px solid #E0E8E4; }
    .meter-section h2 { font-size: 16px; margin-bottom: 6px; }
    .meter-section p { font-size: 13px; color: #6B8278; margin-bottom: 16px; }
    .meter-row { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
    .meter-icon { font-size: 20px; width: 32px; text-align: center; }
    .meter-label { flex: 0 0 80px; font-size: 14px; font-weight: 600; color: #1A2E28; }
    .meter-landlord { flex: 0 0 90px; text-align: center; font-size: 13px; color: #6B8278; background: #E8F4F0; padding: 6px 8px; border-radius: 6px; }
    .meter-input { flex: 1; }
    .meter-input input { width: 100%; padding: 10px 12px; border: 1px solid #E0E8E4; border-radius: 8px; font-size: 14px; font-family: inherit; background: #F5F7F5; color: #1A2E28; }
    .meter-input input:focus { outline: none; border-color: #1A6B55; }
    .meter-header { display: flex; gap: 12px; margin-bottom: 10px; padding-bottom: 8px; border-bottom: 1px solid #E0E8E4; }
    .meter-header span { font-size: 10px; font-weight: 600; color: #6B8278; text-transform: uppercase; letter-spacing: 0.5px; }
    .meter-header .mh-icon { width: 32px; }
    .meter-header .mh-label { flex: 0 0 80px; }
    .meter-header .mh-landlord { flex: 0 0 90px; text-align: center; }
    .meter-header .mh-tenant { flex: 1; }
    .discrepancy { font-size: 11px; color: #C87000; margin-top: 2px; margin-left: 124px; }
    .overall-notes { background: white; border-radius: 12px; padding: 20px; margin-bottom: 16px; border: 1px solid #E0E8E4; }
    .overall-notes h2 { font-size: 16px; margin-bottom: 12px; }
    .signature-section { background: white; border-radius: 12px; padding: 20px; margin-bottom: 20px; border: 1px solid #E0E8E4; }
    .signature-section h2 { font-size: 16px; margin-bottom: 6px; }
    .signature-section p { font-size: 13px; color: #6B8278; margin-bottom: 16px; }
    .signature-pad-container { position: relative; border: 2px solid #E0E8E4; border-radius: 10px; background: #F9FBF9; overflow: hidden; }
    .signature-pad-container canvas { display: block; width: 100%; height: 180px; touch-action: none; }
    .sig-actions { display: flex; justify-content: flex-end; margin-top: 8px; }
    .clear-btn { font-size: 13px; color: #6B8278; background: none; border: 1px solid #E0E8E4; padding: 6px 14px; border-radius: 6px; cursor: pointer; }
    .sig-error { color: #D94F4F; font-size: 12px; margin-top: 6px; display: none; }
    .signature-section ul { list-style: disc; }
    .signature-section li { margin-bottom: 2px; }
    .photo-strip { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
    .photo-thumb { position: relative; width: 80px; height: 80px; border-radius: 8px; overflow: hidden; border: 1px solid #E0E8E4; background: #F0F4F2; }
    .photo-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .photo-thumb .ll-tag { position: absolute; bottom: 2px; left: 2px; right: 2px; padding: 2px 4px; font-size: 9px; color: #fff; background: rgba(26,107,85,0.85); border-radius: 4px; text-align: center; }
    .photo-thumb .x-btn { position: absolute; top: 2px; right: 2px; width: 20px; height: 20px; border-radius: 10px; border: none; background: rgba(217,79,79,0.9); color: #fff; font-size: 14px; cursor: pointer; line-height: 18px; padding: 0; }
    .photo-add { width: 80px; height: 80px; border: 2px dashed #C4D9CE; border-radius: 8px; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 4px; cursor: pointer; color: #6B8278; font-size: 11px; background: transparent; padding: 0; }
    .photo-add:hover { border-color: #1A6B55; color: #1A6B55; }
    .photo-add svg { width: 20px; height: 20px; }
    .photo-add input[type="file"] { display: none; }
    .photo-caption-input { width: 100%; margin-top: 4px; padding: 4px 6px; border: 1px solid #E0E8E4; border-radius: 4px; font-size: 11px; font-family: inherit; background: #F9FBF9; }
    .photo-uploading { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: rgba(255,255,255,0.85); display: flex; align-items: center; justify-content: center; font-size: 10px; color: #6B8278; }
    .submit-btn { width: 100%; padding: 16px; background: #1A6B55; color: white; border: none; border-radius: 12px; font-size: 16px; font-weight: 700; cursor: pointer; margin-bottom: 40px; -webkit-appearance: none; }
    .submit-btn:disabled { opacity: 0.6; }
    .success { text-align: center; padding: 60px 20px; }
    .success h2 { color: #1A6B55; font-size: 24px; margin-bottom: 12px; }
    .success p { color: #6B8278; font-size: 15px; }
    .loading { text-align: center; padding: 60px 20px; color: #6B8278; }
    .error-msg { text-align: center; padding: 40px 20px; color: #D94F4F; }
    .locked-msg { text-align: center; padding: 40px 20px; }
    .locked-msg h2 { color: #1A6B55; font-size: 20px; margin-bottom: 10px; }
    .locked-msg p { color: #6B8278; font-size: 14px; }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">easier<span>Let</span></div>
    <div class="subtitle">Property Inventory Review</div>
  </div>
  <div class="container" id="app">
    <div class="loading">Loading your inventory...</div>
  </div>
  <script>
    const SUPABASE_URL = 'https://ffzknvcptqjlkxmkdxuk.supabase.co'
    const ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZmemtudmNwdHFqbGt4bWtkeHVrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUyNTQ0ODQsImV4cCI6MjA5MDgzMDQ4NH0.YRdkBgoVm7cpUJlsK8T4nP6iNE3vgfOmODImiAkPhr4'
    const FN_BASE = SUPABASE_URL + '/functions/v1/inventory-workflow'
    const MEDIA_FN = SUPABASE_URL + '/functions/v1/inventory-media-upload'
    const FN_HEADERS = { 'apikey': ANON_KEY, 'Authorization': 'Bearer ' + ANON_KEY, 'Content-Type': 'application/json' }
    const PHOTO_MAX_DIM = 1600
    const PHOTO_QUALITY = 0.6
    const PHOTO_MAX_PER_ITEM = 3
    const params = new URLSearchParams(window.location.search)
    const token = params.get('token')
    const app = document.getElementById('app')
    let signaturePad = null
    // photosByItem[item_id] = [{ id, signed_url, caption, uploaded_by }]
    const photosByItem = {}

    function compressImage(file) {
      return new Promise(function(resolve, reject) {
        const reader = new FileReader()
        reader.onload = function() {
          const img = new Image()
          img.onload = function() {
            const longEdge = Math.max(img.width, img.height)
            const scale = longEdge > PHOTO_MAX_DIM ? PHOTO_MAX_DIM / longEdge : 1
            const w = Math.round(img.width * scale)
            const h = Math.round(img.height * scale)
            const canvas = document.createElement('canvas')
            canvas.width = w
            canvas.height = h
            canvas.getContext('2d').drawImage(img, 0, 0, w, h)
            canvas.toBlob(function(blob) {
              if (!blob) return reject(new Error('compression failed'))
              resolve({ blob: blob, width: w, height: h })
            }, 'image/jpeg', PHOTO_QUALITY)
          }
          img.onerror = function() { reject(new Error('not an image')) }
          img.src = reader.result
        }
        reader.onerror = function() { reject(new Error('read failed')) }
        reader.readAsDataURL(file)
      })
    }

    async function uploadPhoto(item_id, file) {
      const compressed = await compressImage(file)
      if (compressed.blob.size > 1024 * 1024) {
        throw new Error('Photo still too large after compression. Try a smaller image.')
      }
      // Presign
      const presignRes = await fetch(MEDIA_FN + '?action=presign', {
        method: 'POST',
        headers: FN_HEADERS,
        body: JSON.stringify({
          token: token,
          item_id: item_id,
          mime_type: 'image/jpeg',
          file_size: compressed.blob.size
        })
      })
      if (!presignRes.ok) {
        const err = await presignRes.json().catch(function() { return {} })
        throw new Error(err.error || 'presign failed')
      }
      const presign = await presignRes.json()
      // PUT to R2
      const putRes = await fetch(presign.upload_url, {
        method: 'PUT',
        headers: { 'Content-Type': 'image/jpeg' },
        body: compressed.blob
      })
      if (!putRes.ok) throw new Error('upload failed: ' + putRes.status)
      // Confirm
      const confRes = await fetch(MEDIA_FN + '?action=confirm', {
        method: 'POST',
        headers: FN_HEADERS,
        body: JSON.stringify({
          token: token,
          item_id: item_id,
          photo_id: presign.photo_id,
          r2_key: presign.r2_key,
          mime_type: 'image/jpeg',
          file_size: compressed.blob.size,
          width: compressed.width,
          height: compressed.height
        })
      })
      if (!confRes.ok) {
        const err = await confRes.json().catch(function() { return {} })
        throw new Error(err.error || 'confirm failed')
      }
      const result = await confRes.json()
      return result.photo
    }

    async function deletePhoto(photo_id) {
      const res = await fetch(MEDIA_FN + '?action=delete', {
        method: 'POST',
        headers: FN_HEADERS,
        body: JSON.stringify({ token: token, photo_id: photo_id })
      })
      return res.ok
    }

    function renderPhotoStrip(item_id) {
      const container = document.getElementById('photos-' + item_id)
      if (!container) return
      const photos = photosByItem[item_id] || []
      let html = ''
      for (const p of photos) {
        const isTenant = p.uploaded_by === 'tenant'
        html += '<div class="photo-thumb">'
        html += '<img src="' + p.signed_url + '" alt="" />'
        if (!isTenant) html += '<div class="ll-tag">Landlord</div>'
        if (isTenant) {
          html += '<button type="button" class="x-btn" data-photo-id="' + p.id + '" data-item-id="' + item_id + '" aria-label="Delete">×</button>'
        }
        html += '</div>'
      }
      if (photos.length < PHOTO_MAX_PER_ITEM) {
        html += '<label class="photo-add"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14" stroke-linecap="round"/></svg>Add photo<input type="file" accept="image/*" capture="environment" data-item-id="' + item_id + '" /></label>'
      }
      container.innerHTML = html
    }

    function renderAllPhotoStrips() {
      for (const itemId of Object.keys(photosByItem)) renderPhotoStrip(itemId)
      // Render strips for items with no photos too — pull all item ids from the form
      const allStrips = document.querySelectorAll('.photo-strip[data-item-id]')
      for (const el of allStrips) {
        const id = el.getAttribute('data-item-id')
        if (!photosByItem[id]) renderPhotoStrip(id)
      }
    }

    function bindPhotoHandlers() {
      // Add-photo file inputs
      app.addEventListener('change', async function(e) {
        const target = e.target
        if (target.matches && target.matches('.photo-add input[type="file"]')) {
          const itemId = target.getAttribute('data-item-id')
          const file = target.files && target.files[0]
          if (!file || !itemId) return
          target.disabled = true
          const container = document.getElementById('photos-' + itemId)
          const placeholder = document.createElement('div')
          placeholder.className = 'photo-thumb'
          placeholder.innerHTML = '<div class="photo-uploading">Uploading…</div>'
          if (container) container.appendChild(placeholder)
          try {
            const photo = await uploadPhoto(itemId, file)
            if (!photosByItem[itemId]) photosByItem[itemId] = []
            photosByItem[itemId].push({
              id: photo.id,
              signed_url: photo.signed_url,
              caption: photo.caption,
              uploaded_by: photo.uploaded_by
            })
          } catch (err) {
            alert('Upload failed: ' + err.message)
          } finally {
            renderPhotoStrip(itemId)
          }
        }
      })
      // Delete-photo X buttons
      app.addEventListener('click', async function(e) {
        const target = e.target
        if (target.matches && target.matches('.photo-thumb .x-btn')) {
          const photoId = target.getAttribute('data-photo-id')
          const itemId = target.getAttribute('data-item-id')
          if (!photoId || !itemId) return
          if (!confirm('Delete this photo?')) return
          target.disabled = true
          const ok = await deletePhoto(photoId)
          if (ok) {
            photosByItem[itemId] = (photosByItem[itemId] || []).filter(function(p) { return p.id !== photoId })
            renderPhotoStrip(itemId)
          } else {
            target.disabled = false
            alert('Delete failed.')
          }
        }
      })
    }

    async function load() {
      if (!token) { app.innerHTML = '<div class="error-msg"><h2>Invalid link</h2><p>Please contact your landlord.</p></div>'; return }
      try {
        const res = await fetch(FN_BASE + '?action=get_inventory&token=' + encodeURIComponent(token), {
          method: 'GET',
          headers: FN_HEADERS
        })
        if (res.status === 404) { app.innerHTML = '<div class="error-msg"><h2>Not found</h2><p>This link may have expired.</p></div>'; return }
        if (!res.ok) {
          const err = await res.text()
          app.innerHTML = '<div class="error-msg"><h2>Error</h2><p>' + err + '</p></div>'
          return
        }
        const data = await res.json()
        const report = data.report
        const property = data.property
        const rooms = data.rooms || []
        const allItems = data.items || {}
        const photos = data.photos || {}
        // Seed the local photo cache from the server payload.
        for (const itemId of Object.keys(photos)) {
          photosByItem[itemId] = photos[itemId].map(function(p) { return {
            id: p.id, signed_url: p.signed_url, caption: p.caption, uploaded_by: p.uploaded_by
          } })
        }

        // Block access if locked or already completed
        if (report.status === 'locked') {
          app.innerHTML = '<div class="locked-msg"><div style="font-size:48px;margin-bottom:16px">🔒</div><h2>Inventory Locked</h2><p>This inventory has been finalised and can no longer be edited.</p></div>'
          return
        }
        if (report.status === 'completed' && report.tenant_signature) {
          app.innerHTML = '<div class="locked-msg"><div style="font-size:48px;margin-bottom:16px">✓</div><h2>Already Submitted</h2><p>You have already submitted this inventory. Please contact your landlord if you need to make changes.</p></div>'
          return
        }

        renderForm(report, property, rooms, allItems)
      } catch(err) {
        app.innerHTML = '<div class="error-msg"><h2>Error</h2><p>' + err.message + '</p></div>'
      }
    }

    function renderForm(report, property, rooms, allItems) {
      const invType = report.inventory_type || 'move_in'
      const typeLabel = invType === 'move_in' ? 'Move-in' : 'Move-out'
      const typeBadgeClass = invType === 'move_in' ? 'move-in' : 'move-out'
      const landlordMeters = report.meter_readings_landlord || {}
      const tenantMeters = report.meter_readings_tenant || {}
      const hasLandlordMeters = landlordMeters.gas || landlordMeters.electric || landlordMeters.water

      let html = '<div class="intro-card"><h1>Inventory for <span class="address">' + (property ? property.address : 'Your Property') + '</span></h1>'
      html += '<span class="type-badge ' + typeBadgeClass + '">' + typeLabel + ' Inventory</span>'
      html += '<p>Hello ' + (report.tenant_name || 'there') + ', as the lead tenant you are asked to review each room and item below and provide your own condition assessment. Your landlord has already completed their assessment — you can agree with it or provide a different rating. Please also confirm the meter readings and sign at the bottom.</p>'
      html += '<p style="font-size:12px;color:#6B8278;margin-top:8px;">This inventory forms part of the tenancy record and may be used as evidence in any deposit dispute under a government-approved Tenancy Deposit Protection scheme.</p></div><form id="inventoryForm">'

      // Meter readings section
      html += '<div class="meter-section"><h2>Meter Readings</h2>'
      html += '<p>Please confirm or provide your own meter readings for this ' + typeLabel.toLowerCase() + '.</p>'

      html += '<div class="meter-header">'
      html += '<span class="mh-icon"></span>'
      html += '<span class="mh-label">Meter</span>'
      if (hasLandlordMeters) html += '<span class="mh-landlord">Landlord</span>'
      html += '<span class="mh-tenant">Your reading</span>'
      html += '</div>'

      // Gas
      html += '<div class="meter-row">'
      html += '<div class="meter-icon">🔥</div>'
      html += '<div class="meter-label">Gas</div>'
      if (hasLandlordMeters) html += '<div class="meter-landlord">' + (landlordMeters.gas || '—') + '</div>'
      html += '<div class="meter-input"><input type="text" name="meter_gas" inputmode="decimal" placeholder="Enter gas reading" value="' + (tenantMeters.gas || '') + '"></div>'
      html += '</div>'

      // Electric
      html += '<div class="meter-row">'
      html += '<div class="meter-icon">⚡</div>'
      html += '<div class="meter-label">Electric</div>'
      if (hasLandlordMeters) html += '<div class="meter-landlord">' + (landlordMeters.electric || '—') + '</div>'
      html += '<div class="meter-input"><input type="text" name="meter_electric" inputmode="decimal" placeholder="Enter electric reading" value="' + (tenantMeters.electric || '') + '"></div>'
      html += '</div>'

      // Water
      html += '<div class="meter-row">'
      html += '<div class="meter-icon">💧</div>'
      html += '<div class="meter-label">Water</div>'
      if (hasLandlordMeters) html += '<div class="meter-landlord">' + (landlordMeters.water || '—') + '</div>'
      html += '<div class="meter-input"><input type="text" name="meter_water" inputmode="decimal" placeholder="Enter water reading (if metered)" value="' + (tenantMeters.water || '') + '"></div>'
      html += '</div>'

      html += '</div>'

      // Condition ratings guide
      html += '<div class="room" style="border-left: 4px solid #1A6B55;"><h2 class="room-title" style="color: #1A2E28;">Condition Ratings Guide</h2>'
      html += '<div style="font-size:13px;color:#6B8278;line-height:1.8;">'
      html += '<p><strong style="color:#1A6B55;">Excellent</strong> — As new or near-new condition with no visible wear, marks or damage</p>'
      html += '<p><strong style="color:#1A6B55;">Good</strong> — Well-maintained with only minor wear consistent with careful use; fully functional</p>'
      html += '<p><strong style="color:#6B8278;">Fair</strong> — Noticeable wear and tear consistent with normal use over time; functional but showing age</p>'
      html += '<p><strong style="color:#C87000;">Poor</strong> — Significant wear, damage or deterioration beyond normal use; may need repair or replacement</p>'
      html += '<p><strong style="color:#D94F4F;">Damaged</strong> — Broken, non-functional or requiring immediate repair; beyond normal wear and tear</p>'
      html += '</div></div>'

      // Rooms and items
      for (const room of rooms) {
        const items = allItems[room.id] || []
        html += '<div class="room"><h2 class="room-title">' + room.name + '</h2>'
        for (const item of items) {
          const conditions = ['Excellent','Good','Fair','Poor','Damaged']
          html += '<div class="item"><div class="item-header"><span class="item-name">' + item.name + '</span>'
          if (item.landlord_condition) html += '<span class="landlord-badge">Landlord: ' + item.landlord_condition + '</span>'
          html += '</div>'
          if (item.landlord_notes) html += '<p class="landlord-notes">Landlord notes: ' + item.landlord_notes + '</p>'
          html += '<div class="field-group"><label>Your assessment of condition</label><select name="item_condition_' + item.id + '"><option value="">Select condition</option>'
          const defaultCond = item.tenant_condition || item.landlord_condition
          for (const c of conditions) html += '<option value="' + c + '"' + (defaultCond === c ? ' selected' : '') + '>' + c + '</option>'
          html += '</select><label>Your notes (optional)</label><textarea name="item_notes_' + item.id + '" placeholder="Any comments...">' + (item.tenant_notes || '') + '</textarea>'
          html += '<label style="margin-top:10px;">Photos (optional, max 3)</label>'
          html += '<div class="photo-strip" data-item-id="' + item.id + '" id="photos-' + item.id + '"></div>'
          html += '</div></div>'
        }
        html += '<div class="field-group"><label>Overall notes for this room (optional)</label><textarea name="room_notes_' + room.id + '" placeholder="Any general comments...">' + (room.tenant_condition || '') + '</textarea></div></div>'
      }

      html += '<div class="overall-notes"><h2>Your Overall Notes</h2><div class="field-group"><label>Any additional comments</label><textarea name="tenant_notes" placeholder="General comments...">' + (report.tenant_notes || '') + '</textarea></div></div>'

      html += `
        <div class="signature-section">
          <h2>Lead Tenant Signature</h2>
          <p style="margin-bottom:12px;">By signing below, you as the lead tenant confirm that:</p>
          <ul style="font-size:13px;color:#6B8278;margin:0 0 16px 16px;line-height:1.8;">
            <li>You have reviewed each room and item in this inventory</li>
            <li>The condition ratings and notes you have provided are accurate to the best of your knowledge</li>
            <li>You understand this document forms the baseline record of the property's condition</li>
            <li>This signed inventory may be used as evidence in any deposit dispute adjudication under a government-approved Tenancy Deposit Protection scheme</li>
          </ul>
          <div class="signature-pad-container">
            <canvas id="signatureCanvas"></canvas>
          </div>
          <div class="sig-actions">
            <button type="button" class="clear-btn" id="clearSig">Clear</button>
          </div>
          <div class="sig-error" id="sigError">Please provide your signature before submitting.</div>
        </div>
        <button type="submit" class="submit-btn" id="submitBtn">Submit & Sign Inventory</button>
      </form>`

      app.innerHTML = html

      // Render photo strips for every item (existing photos + add-button).
      renderAllPhotoStrips()
      bindPhotoHandlers()

      // Initialise signature pad
      const canvas = document.getElementById('signatureCanvas')
      const ratio = Math.max(window.devicePixelRatio || 1, 1)
      canvas.width = canvas.offsetWidth * ratio
      canvas.height = canvas.offsetHeight * ratio
      canvas.getContext('2d').scale(ratio, ratio)
      signaturePad = new SignaturePad(canvas, {
        backgroundColor: 'rgb(249, 251, 249)',
        penColor: '#1A2E28'
      })

      document.getElementById('clearSig').addEventListener('click', function() {
        signaturePad.clear()
      })

      document.getElementById('inventoryForm').addEventListener('submit', async function(e) {
        e.preventDefault()

        if (signaturePad.isEmpty()) {
          document.getElementById('sigError').style.display = 'block'
          return
        }
        document.getElementById('sigError').style.display = 'none'

        const btn = document.getElementById('submitBtn')
        btn.textContent = 'Submitting...'
        btn.disabled = true

        const formData = new FormData(e.target)
        const signatureData = signaturePad.toDataURL('image/png')

        // Build the room + item update payloads.
        const roomsPayload = rooms.map(function(room) {
          return { id: room.id, tenant_condition: formData.get('room_notes_' + room.id) || null }
        })
        const itemsPayload = []
        for (const room of rooms) {
          for (const item of (allItems[room.id] || [])) {
            itemsPayload.push({
              id: item.id,
              tenant_condition: formData.get('item_condition_' + item.id) || null,
              tenant_notes: formData.get('item_notes_' + item.id) || null
            })
          }
        }

        // Tenant meter readings.
        const tenantMeterReadings = {}
        const mGas = formData.get('meter_gas')
        const mElec = formData.get('meter_electric')
        const mWater = formData.get('meter_water')
        if (mGas) tenantMeterReadings.gas = mGas
        if (mElec) tenantMeterReadings.electric = mElec
        if (mWater) tenantMeterReadings.water = mWater

        const submitBody = {
          token: token,
          rooms: roomsPayload,
          items: itemsPayload,
          tenant_signature: signatureData,
          tenant_notes: formData.get('tenant_notes') || null
        }
        if (Object.keys(tenantMeterReadings).length > 0) {
          submitBody.meter_readings = tenantMeterReadings
        }

        try {
          const submitRes = await fetch(FN_BASE + '?action=submit_review', {
            method: 'POST',
            headers: FN_HEADERS,
            body: JSON.stringify(submitBody)
          })
          if (!submitRes.ok) {
            let msg = 'Submission failed'
            try { msg = (await submitRes.json()).error || msg } catch(_) {}
            btn.textContent = 'Submit & Sign Inventory'
            btn.disabled = false
            alert(msg)
            return
          }
        } catch(err) {
          btn.textContent = 'Submit & Sign Inventory'
          btn.disabled = false
          alert('Network error: ' + err.message)
          return
        }

        // Notify landlord — fire and forget.
        fetch(FN_BASE + '?action=notify_landlord&token=' + encodeURIComponent(token), {
          method: 'POST',
          headers: FN_HEADERS
        }).catch(function() {})

        app.innerHTML = '<div class="success"><div style="font-size:48px;margin-bottom:16px">✓</div><h2>Thank you!</h2><p>Your inventory has been signed and submitted successfully.<br>Your landlord will be notified.</p></div>'
      })
    }

    load()
  </script>
</body>
</html>
