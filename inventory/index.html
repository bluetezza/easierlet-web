<!DOCTYPE html>
<html>
<head>

  <script>
    window.onload = function() {
      const params = new URLSearchParams(window.location.search);
      const token = params.get('token');
      if (token) {
        window.location.href = 'https://ffzknvcptqjlkxmkdxuk.supabase.co/functions/v1/inventory-workflow?action=form&token=' + token;
      } else {
        document.getElementById('msg').textContent = 'Invalid link. Please contact your landlord.';
      }
    }
  </script>
</head>
<body>
  <div class="loader">
    <div class="logo">easier<span>Let</span></div>
