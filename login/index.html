<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#1A6B55">
  <title>Sign in — easierLet</title>
  <meta name="description" content="Sign in to easierLet — manage your properties, applications and tenancy from one place.">
  <meta name="robots" content="noindex">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="/assets/easierlet.css">

  <style>
    body {
      font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      min-height: 100vh; display: flex; flex-direction: column;
      background:
        radial-gradient(ellipse at 80% 0%, rgba(29, 158, 117, 0.06), transparent 60%),
        radial-gradient(ellipse at 0% 100%, rgba(26, 107, 85, 0.04), transparent 50%),
        var(--el-bg);
    }
    .top { padding: 22px 24px; display: flex; align-items: center; justify-content: space-between; }
    .brand { font-size: 20px; letter-spacing: -0.3px; color: var(--el-ink); }
    .brand .e { font-family: 'Fraunces', serif; font-weight: 400; }
    .brand .l { font-weight: 500; }
    .top-link { font-size: 14px; color: var(--el-muted); }
    .top-link:hover { color: var(--el-green); }

    main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px 20px; }
    .card { width: 100%; max-width: 420px; background: #fff; border: 1px solid var(--el-line);
            border-radius: 18px; padding: 36px; box-shadow: 0 8px 40px rgba(15, 46, 40, 0.06); }
    .eyebrow { font-size: 11px; font-weight: 500; letter-spacing: 1px; text-transform: uppercase; color: var(--el-green); margin-bottom: 12px; }
    .card h1 { font-family: 'Fraunces', serif; font-weight: 400; font-size: 26px; letter-spacing: -0.5px; color: var(--el-ink); margin-bottom: 6px; }
    .card .lead { color: var(--el-muted); font-size: 14px; margin-bottom: 22px; }

    .field { margin-bottom: 14px; }
    .field label { display: block; font-size: 11px; font-weight: 500; letter-spacing: 0.5px; text-transform: uppercase; color: var(--el-muted); margin-bottom: 6px; }
    .field input { width: 100%; padding: 12px 14px; background: #fff; border: 1px solid var(--el-line); border-radius: 10px; font-size: 15px; color: var(--el-ink); font-family: inherit; outline: none; }
    .field input:focus { border-color: var(--el-green); box-shadow: 0 0 0 3px rgba(26,107,85,0.12); }
    .field-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
    .field-row label { margin: 0; }
    .forgot-link { font-size: 12px; color: var(--el-green); cursor: pointer; background: none; border: none; padding: 0; font-family: inherit; }
    .forgot-link:hover { text-decoration: underline; }

    .submit { width: 100%; margin-top: 6px; padding: 14px; background: var(--el-green); color: #fff; border-radius: 10px; font-size: 15px; font-weight: 500; cursor: pointer; border: none; font-family: inherit; }
    .submit:hover:not(:disabled) { background: #155545; }
    .submit:disabled { opacity: 0.7; cursor: not-allowed; }

    .alt-link { text-align: center; font-size: 13px; color: var(--el-muted); margin-top: 22px; }
    .alt-link a { color: var(--el-green); font-weight: 500; }

    .alert { padding: 12px 14px; border-radius: 10px; font-size: 13px; line-height: 1.5; margin-bottom: 16px; display: none; }
    .alert-error   { background: #FFE8DC; color: var(--el-danger); border: 1px solid #F5C5B0; }
    .alert-success { background: var(--el-green-pale); color: var(--el-green); border: 1px solid var(--el-green-border); }
    .alert.show { display: block; }

    .micro { font-size: 12px; color: var(--el-muted); text-align: center; margin-top: 14px; }
    .micro a { color: var(--el-green); }
  </style>
</head>
<body>

<div class="top">
  <a href="/" class="brand"><span class="e">easier</span><span class="l">Let</span></a>
  <a href="/properties/" class="top-link">Find a home &rarr;</a>
</div>

<main>
  <div class="card">
    <div class="eyebrow">easierLet account</div>
    <h1>Sign in</h1>
    <p class="lead">Use the email and password you registered with. Tenants and landlords use the same sign-in.</p>

    <div class="alert alert-error" id="errorAlert"></div>
    <div class="alert alert-success" id="successAlert"></div>

    <form id="loginForm" autocomplete="on">
      <div class="field">
        <label for="email">Email</label>
        <input id="email" name="email" type="email" autocomplete="email" required autofocus>
      </div>
      <div class="field">
        <div class="field-row">
          <label for="password">Password</label>
          <button type="button" class="forgot-link" id="forgotBtn">Forgot password?</button>
        </div>
        <input id="password" name="password" type="password" autocomplete="current-password" minlength="8" required>
      </div>
      <button type="submit" class="submit" id="submitBtn">Sign in</button>
    </form>

    <div class="alt-link">
      New landlord? <a href="/signup/">Create your account</a>
    </div>
    <div class="micro">
      Tenants — your landlord invites you. <a href="/properties/">Browse homes</a> instead?
    </div>
  </div>
</main>

<script type="module">
  import { createClient } from "https://esm.sh/@supabase/supabase-js@2.45.4";

  const SUPABASE_URL  = "https://ffzknvcptqjlkxmkdxuk.supabase.co";
  const SUPABASE_ANON = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZmemtudmNwdHFqbGt4bWtkeHVrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUyNTQ0ODQsImV4cCI6MjA5MDgzMDQ4NH0.YRdkBgoVm7cpUJlsK8T4nP6iNE3vgfOmODImiAkPhr4";

  const client = createClient(SUPABASE_URL, SUPABASE_ANON, {
    auth: { persistSession: true, autoRefreshToken: true, detectSessionInUrl: true, storageKey: "el-portal-session" },
  });

  const $ = (id) => document.getElementById(id);
  const url = new URL(window.location.href);
  const next = url.searchParams.get("next") || null;

  function showError(msg)   { const a = $("errorAlert");   a.textContent = msg; a.classList.add("show"); $("successAlert").classList.remove("show"); }
  function showSuccess(msg) { const a = $("successAlert"); a.textContent = msg; a.classList.add("show"); $("errorAlert").classList.remove("show"); }
  function clearAlerts()    { $("errorAlert").classList.remove("show"); $("successAlert").classList.remove("show"); }

  // -------------------------------------------------------------------------
  // Resolve role + redirect
  // -------------------------------------------------------------------------
  async function resolveRoleAndRedirect(user) {
    let role = null;
    try {
      const { data: profile } = await client.from("profiles").select("role").eq("id", user.id).maybeSingle();
      if (profile?.role === "tenant" || profile?.role === "landlord") role = profile.role;
    } catch (_e) {}
    if (!role) {
      try {
        const { data: tenants } = await client.from("tenants").select("id").eq("tenant_auth_id", user.id).limit(1);
        if (tenants && tenants.length) role = "tenant";
      } catch (_e) {}
    }
    if (!role) role = "landlord";

    if (next) { window.location.href = next; return; }
    window.location.href = role === "tenant" ? "/tenant/" : "/landlord/";
  }

  // Already signed in? Skip the form.
  (async () => {
    const { data } = await client.auth.getSession();
    if (data?.session?.user) await resolveRoleAndRedirect(data.session.user);
  })();

  // -------------------------------------------------------------------------
  // Sign-in
  // -------------------------------------------------------------------------
  $("loginForm").addEventListener("submit", async (e) => {
    e.preventDefault();
    clearAlerts();
    const email = $("email").value.trim();
    const password = $("password").value;
    const btn = $("submitBtn");
    btn.disabled = true; btn.textContent = "Signing in…";
    try {
      const { data, error } = await client.auth.signInWithPassword({ email, password });
      if (error) throw error;
      await resolveRoleAndRedirect(data.user);
    } catch (err) {
      showError(err?.message || "Email or password incorrect.");
      btn.disabled = false; btn.textContent = "Sign in";
    }
  });

  // -------------------------------------------------------------------------
  // Forgot password — fires our branded EF (not Supabase's default email).
  // -------------------------------------------------------------------------
  $("forgotBtn").addEventListener("click", async () => {
    clearAlerts();
    const email = $("email").value.trim();
    if (!email) {
      showError("Enter your email above first, then tap Forgot password.");
      $("email").focus();
      return;
    }
    try {
      const r = await fetch(`${SUPABASE_URL}/functions/v1/password-reset-request`, {
        method: "POST",
        headers: { "Content-Type": "application/json", "apikey": SUPABASE_ANON },
        body: JSON.stringify({ email }),
      });
      // The EF deliberately always returns 200 to avoid email enumeration.
      // Show the same message regardless.
      showSuccess(`If an account exists for ${email}, we've sent a password-reset link. Check your inbox (and spam).`);
    } catch (err) {
      showError("Couldn't send the reset link — please try again in a moment.");
    }
  });
</script>
</body>
</html>
