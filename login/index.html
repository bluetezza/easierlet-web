<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#1A6B55">
  <title>Sign in — easierLet</title>
  <meta name="description" content="Sign in to easierLet — manage your properties, applications and tenancy from one place.">
  <meta name="robots" content="noindex">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="/assets/easierlet.css">

  <style>
    body {
      font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      min-height: 100vh;
      display: flex; flex-direction: column;
      background:
        radial-gradient(ellipse at 80% 0%, rgba(29, 158, 117, 0.06), transparent 60%),
        radial-gradient(ellipse at 0% 100%, rgba(26, 107, 85, 0.04), transparent 50%),
        var(--el-bg);
    }
    .top { padding: 22px 24px; display: flex; align-items: center; justify-content: space-between; }
    .brand { font-size: 20px; letter-spacing: -0.3px; color: var(--el-ink); }
    .brand .e { font-family: 'Fraunces', serif; font-weight: 400; }
    .brand .l { font-weight: 500; }
    .top-link { font-size: 14px; color: var(--el-muted); }
    .top-link:hover { color: var(--el-green); }

    main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px 20px; }

    .card {
      width: 100%; max-width: 440px;
      background: #fff;
      border: 1px solid var(--el-line);
      border-radius: 18px;
      padding: 36px;
      box-shadow: 0 8px 40px rgba(15, 46, 40, 0.06);
    }
    .eyebrow {
      font-size: 11px; font-weight: 500; letter-spacing: 1px;
      text-transform: uppercase; color: var(--el-green);
      margin-bottom: 12px;
    }
    .card h1 {
      font-family: 'Fraunces', serif; font-weight: 400;
      font-size: 28px; letter-spacing: -0.5px; color: var(--el-ink);
      margin-bottom: 8px;
    }
    .card .lead { color: var(--el-muted); font-size: 14px; margin-bottom: 24px; }

    .seg {
      display: grid; grid-template-columns: 1fr 1fr;
      background: var(--el-bg);
      border: 1px solid var(--el-line);
      border-radius: 10px; padding: 4px;
      margin-bottom: 22px;
    }
    .seg button {
      padding: 8px 12px; border-radius: 7px;
      font-size: 13px; font-weight: 500;
      color: var(--el-muted);
    }
    .seg button.active {
      background: #fff; color: var(--el-ink);
      box-shadow: 0 1px 3px rgba(15, 46, 40, 0.06);
    }

    .field { margin-bottom: 14px; }
    .field label {
      display: block; font-size: 11px; font-weight: 500; letter-spacing: 0.5px;
      text-transform: uppercase; color: var(--el-muted); margin-bottom: 6px;
    }
    .field input {
      width: 100%; padding: 12px 14px;
      background: #fff; border: 1px solid var(--el-line);
      border-radius: 10px; font-size: 15px; color: var(--el-ink);
      font-family: inherit; outline: none;
      transition: border-color 120ms ease, box-shadow 120ms ease;
    }
    .field input:focus { border-color: var(--el-green); box-shadow: 0 0 0 3px rgba(26,107,85,0.12); }

    .role-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
    }
    .role-pick {
      display: flex; flex-direction: column; align-items: flex-start; gap: 4px;
      padding: 14px 14px;
      background: #fff;
      border: 1px solid var(--el-line);
      border-radius: 10px;
      cursor: pointer;
      transition: border-color 120ms ease, background 120ms ease;
    }
    .role-pick:hover { border-color: var(--el-green-border); background: var(--el-green-pale); }
    .role-pick.selected { border-color: var(--el-green); background: var(--el-green-pale); }
    .role-pick .role-icon {
      width: 28px; height: 28px; border-radius: 8px;
      background: var(--el-green-pale); color: var(--el-green);
      display: flex; align-items: center; justify-content: center;
    }
    .role-pick.selected .role-icon { background: var(--el-green); color: #fff; }
    .role-pick .role-label { font-size: 14px; font-weight: 500; color: var(--el-ink); }
    .role-pick .role-sub { font-size: 12px; color: var(--el-muted); line-height: 1.4; }
    .role-pick input { display: none; }

    .submit {
      width: 100%; margin-top: 10px;
      padding: 14px;
      background: var(--el-green); color: #fff;
      border-radius: 10px; font-size: 15px; font-weight: 500;
    }
    .submit:hover:not(:disabled) { background: #155545; }
    .submit:disabled { opacity: 0.7; cursor: not-allowed; }

    .divider {
      display: flex; align-items: center; gap: 10px;
      margin: 22px 0 16px;
      color: var(--el-muted); font-size: 12px;
      text-transform: uppercase; letter-spacing: 0.6px;
    }
    .divider::before, .divider::after { content: ""; flex: 1; height: 1px; background: var(--el-line); }

    .magic-btn {
      width: 100%;
      padding: 12px;
      background: transparent;
      color: var(--el-green);
      border: 1px solid var(--el-green-border);
      border-radius: 10px;
      font-size: 14px; font-weight: 500;
    }
    .magic-btn:hover { background: var(--el-green-pale); }

    .alt-link { text-align: center; font-size: 13px; color: var(--el-muted); margin-top: 20px; }
    .alt-link a { color: var(--el-green); font-weight: 500; }

    .alert {
      padding: 12px 14px; border-radius: 10px;
      font-size: 13px; line-height: 1.5;
      margin-bottom: 16px; display: none;
    }
    .alert-error   { background: #FFE8DC; color: var(--el-danger); border: 1px solid #F5C5B0; }
    .alert-success { background: var(--el-green-pale); color: var(--el-green); border: 1px solid var(--el-green-border); }
    .alert.show { display: block; }
  </style>
</head>
<body>

<div class="top">
  <a href="/" class="brand"><span class="e">easier</span><span class="l">Let</span></a>
  <a href="/properties/" class="top-link">Find a home &rarr;</a>
</div>

<main>
  <div class="card">
    <div class="eyebrow">easierLet account</div>
    <h1 id="title">Welcome back</h1>
    <p class="lead" id="lead">One sign-in for tenants and landlords. We'll take you to the right place.</p>

    <div class="seg" role="tablist">
      <button id="modeSignin" class="active" type="button">Sign in</button>
      <button id="modeSignup" type="button">Create account</button>
    </div>

    <div class="alert alert-error" id="errorAlert"></div>
    <div class="alert alert-success" id="successAlert"></div>

    <form id="authForm">
      <!-- Account type — only shown for sign-up -->
      <div class="field" id="roleField" style="display:none">
        <label>I'm signing up as a…</label>
        <div class="role-grid">
          <label class="role-pick" data-role="tenant">
            <span class="role-icon"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12L12 3l9 9"/><path d="M5 10v10a1 1 0 001 1h12a1 1 0 001-1V10"/></svg></span>
            <span class="role-label">Tenant</span>
            <span class="role-sub">I'm looking for a home to rent.</span>
            <input type="radio" name="role" value="tenant">
          </label>
          <label class="role-pick" data-role="landlord">
            <span class="role-icon"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 21h18"/><path d="M5 21V7l7-4 7 4v14"/><rect x="9" y="13" width="6" height="8"/></svg></span>
            <span class="role-label">Landlord</span>
            <span class="role-sub">I want to list and manage properties.</span>
            <input type="radio" name="role" value="landlord">
          </label>
        </div>
      </div>

      <!-- Name — only shown for sign-up -->
      <div class="field" id="nameField" style="display:none">
        <label for="name">Your name</label>
        <input id="name" name="name" type="text" autocomplete="name">
      </div>

      <div class="field">
        <label for="email">Email</label>
        <input id="email" name="email" type="email" autocomplete="email" required>
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input id="password" name="password" type="password" autocomplete="current-password" minlength="8" required>
      </div>
      <button type="submit" class="submit" id="submitBtn">Sign in</button>
    </form>

    <div class="divider">or</div>
    <button class="magic-btn" id="magicBtn" type="button">Email me a magic link</button>

    <div class="alt-link">
      Just browsing? <a href="/properties/">Find a home to let &rarr;</a>
    </div>
  </div>
</main>

<script type="module">
  import { createClient } from "https://esm.sh/@supabase/supabase-js@2.45.4";

  const SUPABASE_URL = "https://ffzknvcptqjlkxmkdxuk.supabase.co";
  const SUPABASE_ANON = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZmemtudmNwdHFqbGt4bWtkeHVrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUyNTQ0ODQsImV4cCI6MjA5MDgzMDQ4NH0.YRdkBgoVm7cpUJlsK8T4nP6iNE3vgfOmODImiAkPhr4";
  const LOGIN = "/login/";

  const client = createClient(SUPABASE_URL, SUPABASE_ANON, {
    auth: {
      persistSession: true,
      autoRefreshToken: true,
      detectSessionInUrl: true,
      storageKey: "el-portal-session",
    },
  });

  const url = new URL(window.location.href);
  const next = url.searchParams.get("next") || null;
  const signupHint = url.searchParams.get("signup") === "1";
  // Lets the homepage's "I'm a tenant" / "I'm a landlord" buttons pre-pick
  // the role on signup. Just a default, the user can change it.
  const roleHint = url.searchParams.get("role");

  // -------------------------------------------------------------------------
  // Resolve the user's account role and route to the right portal.
  //
  // Order of precedence:
  //   1. profiles.role (the canonical source — set by signup, or by the
  //      iOS app and tenant-portal edge function).
  //   2. A tenants row with tenant_auth_id = user.id (for tenants who
  //      arrived via invite/apply before the role column existed).
  //   3. Fallback to landlord (the iOS app's existing user base).
  //
  // If `next` is present and points to a portal that matches the role,
  // we honour it. Otherwise we go to the role's home so a tenant doesn't
  // land on /landlord/ by accident (or vice versa).
  // -------------------------------------------------------------------------
  async function resolveRoleAndRedirect(user) {
    let role = null;

    try {
      const { data: profile } = await client
        .from("profiles")
        .select("role")
        .eq("id", user.id)
        .maybeSingle();
      if (profile?.role === "tenant" || profile?.role === "landlord") {
        role = profile.role;
      }
    } catch (e) { /* RLS may block — fall through */ }

    if (!role) {
      try {
        const { data: tenants } = await client
          .from("tenants")
          .select("id")
          .eq("tenant_auth_id", user.id)
          .limit(1);
        if (tenants && tenants.length) role = "tenant";
      } catch (e) { /* fall through */ }
    }

    if (!role) role = "landlord";

    const home = role === "tenant" ? "/tenant/" : "/landlord/";

    let target = home;
    if (next) {
      const allowed =
        next.startsWith(home) ||
        next.startsWith("/properties/") ||
        next === "/" ||
        // Legacy /tenant/login/ or /landlord/login/ links — bounce to role home
        next.startsWith("/tenant/login") || next.startsWith("/landlord/login");
      if (allowed) target = next.startsWith("/login/") ? home : (next.startsWith(home) ? next : home);
    }
    window.location.replace(target);
  }

  // If we're already signed in, route immediately.
  const { data: { session } } = await client.auth.getSession();
  if (session) await resolveRoleAndRedirect(session.user);

  const $ = (id) => document.getElementById(id);
  const errorAlert = $("errorAlert");
  const successAlert = $("successAlert");
  const submitBtn = $("submitBtn");
  const passwordInput = $("password");

  let mode = signupHint ? "signup" : "signin";
  let pickedRole = roleHint === "tenant" || roleHint === "landlord" ? roleHint : null;

  function setMode(m) {
    mode = m;
    $("modeSignin").classList.toggle("active", m === "signin");
    $("modeSignup").classList.toggle("active", m === "signup");
    $("nameField").style.display = m === "signup" ? "" : "none";
    $("roleField").style.display = m === "signup" ? "" : "none";
    $("title").textContent = m === "signup" ? "Create your account" : "Welcome back";
    $("lead").textContent = m === "signup"
      ? "Pick the kind of account you want — you can manage your portal once you're in."
      : "One sign-in for tenants and landlords. We'll take you to the right place.";
    submitBtn.textContent = m === "signup" ? "Create account" : "Sign in";
    passwordInput.setAttribute("autocomplete", m === "signup" ? "new-password" : "current-password");
    clearAlerts();
  }
  $("modeSignin").addEventListener("click", () => setMode("signin"));
  $("modeSignup").addEventListener("click", () => setMode("signup"));

  // Wire role picker
  document.querySelectorAll(".role-pick").forEach((el) => {
    el.addEventListener("click", (e) => {
      e.preventDefault();
      pickedRole = el.dataset.role;
      document.querySelectorAll(".role-pick").forEach((x) => x.classList.toggle("selected", x === el));
      el.querySelector("input").checked = true;
    });
  });
  if (pickedRole) {
    const el = document.querySelector(`.role-pick[data-role="${pickedRole}"]`);
    if (el) { el.classList.add("selected"); el.querySelector("input").checked = true; }
  }
  setMode(mode);

  function clearAlerts() {
    errorAlert.classList.remove("show");
    successAlert.classList.remove("show");
  }
  function showError(msg) { errorAlert.textContent = msg; errorAlert.classList.add("show"); successAlert.classList.remove("show"); }
  function showSuccess(msg) { successAlert.textContent = msg; successAlert.classList.add("show"); errorAlert.classList.remove("show"); }

  async function ensureProfileRole(user, role, name) {
    if (!user) return;
    try {
      await client.from("profiles").upsert({
        id: user.id,
        role,
        ...(name ? { full_name: name } : {}),
      }, { onConflict: "id" });
    } catch (e) {
      console.warn("profile upsert failed", e);
    }
  }

  $("authForm").addEventListener("submit", async (e) => {
    e.preventDefault();
    clearAlerts();
    submitBtn.disabled = true;

    const email = $("email").value.trim();
    const password = $("password").value;
    const name = $("name").value.trim();

    try {
      if (mode === "signup") {
        if (!pickedRole) {
          submitBtn.disabled = false;
          showError("Pick whether you're signing up as a tenant or a landlord.");
          return;
        }
        const { data, error } = await client.auth.signUp({
          email, password,
          options: {
            data: { role: pickedRole, full_name: name || undefined },
            emailRedirectTo: `${window.location.origin}${LOGIN}${next ? `?next=${encodeURIComponent(next)}` : ""}`,
          },
        });
        if (error) throw error;
        if (!data.session) {
          showSuccess("Account created. Check your email to confirm, then sign in.");
          submitBtn.disabled = false;
          return;
        }
        await ensureProfileRole(data.user, pickedRole, name);
        await resolveRoleAndRedirect(data.user);
      } else {
        const { data, error } = await client.auth.signInWithPassword({ email, password });
        if (error) throw error;
        await resolveRoleAndRedirect(data.user);
      }
    } catch (err) {
      showError(err?.message || "Something went wrong. Please try again.");
      submitBtn.disabled = false;
    }
  });

  $("magicBtn").addEventListener("click", async () => {
    clearAlerts();
    const email = $("email").value.trim();
    if (!email) {
      showError("Enter your email first, then we'll send you a magic link.");
      $("email").focus();
      return;
    }
    if (mode === "signup" && !pickedRole) {
      showError("Pick whether you're signing up as a tenant or a landlord first.");
      return;
    }
    try {
      const { error } = await client.auth.signInWithOtp({
        email,
        options: {
          shouldCreateUser: mode === "signup",
          emailRedirectTo: `${window.location.origin}${LOGIN}${next ? `?next=${encodeURIComponent(next)}` : ""}`,
          data: mode === "signup" ? { role: pickedRole } : undefined,
        },
      });
      if (error) throw error;
      showSuccess(`We've sent a sign-in link to ${email}. Check your inbox.`);
    } catch (err) {
      showError(err?.message || "Could not send the magic link.");
    }
  });
</script>
</body>
</html>
