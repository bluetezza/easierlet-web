<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex">
  <title>Sign in — easierLet</title>
  <!--
    Legacy URL — easierLet now uses one sign-in page at /login/ that
    routes you to the tenant or landlord portal based on your account
    role. This page redirects there and preserves the auth fragment so
    magic-link emails sent before the change still work.
  -->
  <script>
    (function () {
      var url = new URL("/login/", window.location.origin);
      var existing = new URL(window.location.href);
      existing.searchParams.forEach(function (v, k) { url.searchParams.set(k, v); });
      var target = url.toString() + window.location.hash;
      window.location.replace(target);
    })();
  </script>
  <noscript><meta http-equiv="refresh" content="0; url=/login/"></noscript>
</head>
<body>
  <p style="font-family:sans-serif;text-align:center;padding:40px;color:#5E7A72">Redirecting to <a href="/login/">/login/</a>…</p>
</body>
</html>
