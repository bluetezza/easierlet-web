<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#1A6B55">
  <title>You're all set — easierLet</title>
  <meta name="robots" content="noindex">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="/assets/easierlet.css?v=20260428a">
  <link rel="stylesheet" href="/assets/portal.css?v=20260428a">

  <style>
    .success-wrap { max-width: 520px; margin: 80px auto; text-align: center; padding: 20px; }
    .success-icon { font-size: 64px; margin-bottom: 18px; }
    .success-wrap h1 { font-family: 'Fraunces', serif; font-weight: 400; font-size: 32px; color: var(--el-ink); margin: 0 0 14px; }
    .success-wrap p { color: var(--el-ink-soft); font-size: 16px; line-height: 1.5; margin: 0 0 24px; }
    .actions { display: inline-flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
    .btn-primary { display: inline-block; background: var(--el-green); color: #fff; padding: 14px 28px; border-radius: 12px; font-size: 15px; font-weight: 500; text-decoration: none; }
    .btn-secondary { display: inline-block; background: #fff; color: var(--el-green); border: 1px solid var(--el-green); padding: 14px 28px; border-radius: 12px; font-size: 15px; font-weight: 500; text-decoration: none; }
  </style>
</head>
<body class="elp-body">
  <div class="success-wrap">
    <div class="success-icon">🎉</div>
    <h1>You're all set</h1>
    <p>Your subscription is active. Your plan and property limit are now unlocked, and a receipt has been emailed to you.</p>
    <div class="actions">
      <a href="/landlord/" class="btn-primary">Open dashboard</a>
      <a href="/billing/" class="btn-secondary">View billing</a>
    </div>
  </div>
</body>
</html>
