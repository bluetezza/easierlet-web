<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#194D3A">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="manifest" href="/manifest.json">
  <title>Checkout cancelled — easierLet</title>
  <meta name="robots" content="noindex">


  <link rel="stylesheet" href="/assets/easierlet.css?v=20260428a">
  <link rel="stylesheet" href="/assets/portal.css?v=20260428a">

  <style>
    .cancel-wrap { max-width: 520px; margin: 80px auto; text-align: center; padding: 20px; }
    .cancel-icon { font-size: 56px; margin-bottom: 18px; }
    .cancel-wrap h1 { font-family: var(--font-sans); font-weight: 400; font-size: 30px; color: var(--el-ink); margin: 0 0 14px; }
    .cancel-wrap p { color: var(--el-ink-soft); font-size: 16px; line-height: 1.5; margin: 0 0 24px; }
    .actions { display: inline-flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
    .btn-primary { display: inline-block; background: var(--el-green); color: #fff; padding: 14px 28px; border-radius: 12px; font-size: 15px; font-weight: 500; text-decoration: none; }
    .btn-secondary { display: inline-block; background: #fff; color: var(--el-green); border: 1px solid var(--el-green); padding: 14px 28px; border-radius: 12px; font-size: 15px; font-weight: 500; text-decoration: none; }
  </style>
</head>
<body class="elp-body">
  <div class="cancel-wrap">
    <div class="cancel-icon">👍</div>
    <h1>No worries</h1>
    <p>You backed out of checkout — nothing was charged. Your trial is still active and you can pick a plan whenever you're ready.</p>
    <div class="actions">
      <a href="/billing/" class="btn-primary">Back to billing</a>
      <a href="/landlord/" class="btn-secondary">Open dashboard</a>
    </div>
  </div>
</body>
</html>
